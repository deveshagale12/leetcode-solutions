name: Sync Leetcode

on:
  workflow_dispatch: # Allows you to manually trigger it anytime
  schedule:
    - cron: "0 8 * * *" # Automatically runs every single day at 8:00 AM UTC

# This line explicitly bypasses the missing UI button and grants writing access
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Sync Submissions
        uses: joshcai/leetcode-sync@v1.7
        with:
          github-token: ${{ github.token }}
          leetcode-csrf-token: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          leetcode-session: ${{ secrets.LEETCODE_SESSION }}
